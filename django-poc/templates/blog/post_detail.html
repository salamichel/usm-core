{% extends "base.html" %}

{% block title %}{{ post.titre }} — USM Volley{% endblock %}

{% block content %}
  <article class="border-4 border-black bg-white p-8 shadow-[8px_8px_0_#000]">
    <a href="{% url 'blog_list' %}" class="text-sm font-bold hover:underline">← Retour au blog</a>

    <h1 class="text-4xl font-black mt-4 mb-2">{{ post.titre }}</h1>
    <p class="text-sm text-gray-600 mb-6">
      Publié le {{ post.date_publication|date:"d/m/Y" }}
      {% if post.categorie %} · <span class="font-bold">{{ post.categorie }}</span>{% endif %}
    </p>

    <div class="prose max-w-none">
      {{ post.contenu|safe }}
    </div>
  </article>
{% endblock %}
