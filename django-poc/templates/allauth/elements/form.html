{% load allauth %}
<form class="allauth-form max-w-md mx-auto border-4 border-black bg-white p-6 shadow-[8px_8px_0_#000] space-y-4"
      method="{{ attrs.method }}"
      {% if attrs.action %}action="{{ attrs.action }}"{% endif %}>
    {% slot body %}
    {% endslot %}
    <div class="pt-2">
      {% slot actions %}
      {% endslot %}
    </div>
</form>
