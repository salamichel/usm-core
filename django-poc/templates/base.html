{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}USM Volley — POC Django 5.2{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    .btn-neo {
      border: 4px solid #000;
      box-shadow: 6px 6px 0 #000;
      transition: transform .15s cubic-bezier(.4,0,.2,1), box-shadow .15s cubic-bezier(.4,0,.2,1);
    }
    .btn-neo:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 #000; }
    .btn-neo:active { transform: translate(4px,4px); box-shadow: 2px 2px 0 #000; }
  </style>
</head>
<body class="bg-amber-50 text-gray-900">
  <header class="border-b-4 border-black bg-[#94674d] text-white">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-black tracking-tight">USM VOLLEY</a>
      <nav class="flex gap-4 text-sm font-bold">
        <a href="/adhesion/" class="hover:underline">Adhésion</a>
        <a href="/accounts/login/" class="hover:underline">Connexion</a>
        <a href="/admin/" class="hover:underline">Admin</a>
      </nav>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% if messages %}
      {% for m in messages %}
        <div class="mb-4 p-4 border-4 border-black bg-amber-200 font-bold">{{ m }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t-4 border-black mt-12 py-6 text-center text-sm">
    POC Django 5.2 — USM Volley
  </footer>
</body>
</html>
