services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://usm:usm_password@postgres:5432/usm_volley
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: dev-only-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: usm
      POSTGRES_PASSWORD: usm_password
      POSTGRES_DB: usm_volley
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
