{% if montant %}
  <p class="font-black text-2xl">Tarif : {{ montant }} €</p>
  <p class="text-sm mt-1">Catégorie : <strong>{{ categorie }}</strong></p>
  {% if show_compet_loisir %}
    <p class="text-sm mt-2">
      Les champs <em>Souhait d'équipe</em> et <em>Coupes</em> sont à remplir ci-dessous.
    </p>
  {% endif %}
{% else %}
  <p class="text-sm">Sélectionnez une catégorie pour afficher le tarif.</p>
{% endif %}
