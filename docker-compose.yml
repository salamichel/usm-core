services:

  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor   # exclure vendor du bind mount
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_NAME: usm_volley
      DB_USER: usm
      DB_PASS: usm_password
      APP_DEBUG: "true"
      BASE_URL: "https://usm.moka-web.net/"

  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: usm_volley
      MYSQL_USER: usm
      MYSQL_PASSWORD: usm_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "usm", "-pusm_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations ─────────────────────────────────────────────────────────────
  # Tourne à chaque "docker compose up", applique tous les fichiers SQL dans l'ordre.
  # Idempotent : CREATE TABLE IF NOT EXISTS + INSERT IGNORE.
  migrate:
    image: mysql:8.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_PWD: usm_password
    command: >
      sh -c "
        echo '→ schema.sql' &&
        mysql -h db -u usm usm_volley < /sql/schema.sql &&
        echo '→ seed.sql (INSERT IGNORE)' &&
        mysql -h db -u usm usm_volley < /sql/seed.sql &&
        echo '→ add_photos.sql' &&
        mysql -h db -u usm usm_volley < /sql/add_photos.sql &&
        echo '✓ Migrations terminées'
      "
    volumes:
      - ./database:/sql:ro
    restart: "no"

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db
