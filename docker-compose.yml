services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://usm:usm_password@postgres:5432/usm_volley
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py tailwind install &&
             python manage.py tailwind build &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: usm
      POSTGRES_PASSWORD: usm_password
      POSTGRES_DB: usm_volley
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usm"]
      interval: 5s
      timeout: 5s
      retries: 5

