version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usm-volley-app
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://usm:usm_password@postgres:5432/usm_volley
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - ./src:/app/src
      - ./public/uploads:/app/public/uploads
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - usm-network
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: usm-volley-postgres
    environment:
      POSTGRES_USER: usm
      POSTGRES_PASSWORD: usm_password
      POSTGRES_DB: usm_volley
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - usm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  usm-network:
    driver: bridge
