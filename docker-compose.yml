services:

  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor   # exclure vendor du bind mount
    depends_on:
      migrate:
        condition: service_completed_successfully
      migrate_external:
        condition: service_completed_successfully
    env_file: .env

  db:
    image: mariadb:11.4.10
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations base locale ──────────────────────────────────────────────────
  # Tourne à chaque "docker compose up", applique tous les fichiers SQL dans l'ordre.
  # Idempotent : CREATE TABLE IF NOT EXISTS + INSERT IGNORE.
  migrate:
    image: mariadb:11.4.10
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      MYSQL_PWD: ${DB_PASS}
    command: sh /scripts/migrate.sh db ${DB_USER} ${DB_NAME}
    volumes:
      - ./database:/sql:ro
      - ./docker:/scripts:ro
    restart: "no"

  # ── Base externe simulée ────────────────────────────────────────────────────
  db_external:
    image: mariadb:11.4.10
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${EXT_DB_NAME}
      MYSQL_USER: ${EXT_DB_USER}
      MYSQL_PASSWORD: ${EXT_DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql_external:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations base externe ─────────────────────────────────────────────────
  migrate_external:
    image: mariadb:11.4.10
    depends_on:
      db_external:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      MYSQL_PWD: ${EXT_DB_PASS}
    command: sh /scripts/migrate_external.sh db_external ${EXT_DB_USER} ${EXT_DB_NAME}
    volumes:
      - ./database:/sql:ro
      - ./docker:/scripts:ro
    restart: "no"

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      TZ: ${TZ}
      PMA_ARBITRARY: 1
      PMA_HOSTS: db,db_external
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
      - db_external
