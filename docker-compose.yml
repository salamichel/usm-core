version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usm-volley-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-usm}:${POSTGRES_PASSWORD:-usm_password}@postgres:5432/${POSTGRES_DB:-usm_volley}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - HELLOASSO_API_KEY=${HELLOASSO_API_KEY}
      - HELLOASSO_WEBHOOK_SECRET=${HELLOASSO_WEBHOOK_SECRET}
      - BREVO_API_KEY=${BREVO_API_KEY}
    volumes:
      - ./src:/app/src
      - ./public/uploads:/app/public/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - usm-network
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: usm-volley-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usm_password}
      POSTGRES_DB: ${POSTGRES_DB:-usm_volley}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - usm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  usm-network:
    driver: bridge
